<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vouch System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 420px;
      background: #0e0e0e;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(255,255,255,0.08);
    }

    h1 { text-align: center; }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: black;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { opacity: 0.8; }

    .result {
      margin-top: 18px;
      padding: 12px;
      background: black;
      border-radius: 10px;
      text-align: center;
    }

    .line {
      height: 1px;
      background: #333;
      margin: 20px 0;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Vouch</h1>

  <input id="vouchUser" placeholder="@username">
  <button onclick="vouch()">Send Vouch</button>

  <div class="line"></div>

  <input id="checkUser" placeholder="@checkuser">
  <button onclick="check()">Check Vouches</button>

  <div class="result" id="result">Ready</div>
</div>

<script>
async function vouch() {
  const username = document.getElementById("vouchUser").value;

  const res = await fetch("/vouch", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username })
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.message;
}

async function check() {
  const username = document.getElementById("checkUser").value;

  const res = await fetch("/user/" + username);
  const data = await res.json();

  document.getElementById("result").innerHTML =
    `<b>${data.username}</b><br><br>⭐ ${data.vouches} Vouches`;
}
</script>

</body>
</html>
