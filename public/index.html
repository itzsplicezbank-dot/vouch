<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vouch System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      width: 900px;
      max-width: 100%;
    }

    .panel {
      flex: 1;
      background: #0e0e0e;
      padding: 24px;
      border-radius: 12px;
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 15px;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #777;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #000;
      border: 1px solid #2a2a2a;
      color: white;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    .result {
      margin-top: 15px;
      padding: 12px;
      background: #000;
      border: 1px solid #222;
      border-radius: 10px;
      text-align: center;
      min-height: 40px;
    }

    .lb-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #1d1d1d;
      font-size: 13px;
    }

    .lb-item:last-child {
      border-bottom: none;
    }

    .lb-rank {
      width: 30px;
      color: #777;
    }

    .lb-user {
      flex: 1;
    }

    .lb-score {
      color: #aaa;
      font-weight: bold;
    }

    .refresh {
      margin-top: 10px;
      background: #111;
      border: 1px solid #222;
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="panel">
    <h1>Vouch System</h1>

    <div class="subtitle">Build sprite reputation by vouching users</div>
    <div class="hint">@username format</div>

    <input id="vouchUser" placeholder="@username">
    <button onclick="vouch()">Vouch</button>

    <input id="checkUser" placeholder="@checkuser">
    <button onclick="check()">Check</button>

    <div class="result" id="result">Ready</div>
  </div>

  <div class="panel">
    <h2>Top 10 Leaderboard</h2>

    <div id="leaderboardList">Loading...</div>

    <button class="refresh" onclick="loadLeaderboard()">Refresh</button>
  </div>

</div>

<script>

async function vouch() {
  const username = document.getElementById("vouchUser").value;

  const res = await fetch("/vouch", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username })
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.message;

  loadLeaderboard();
}

async function check() {
  const username = document.getElementById("checkUser").value;

  const res = await fetch("/user/" + username);
  const data = await res.json();

  document.getElementById("result").innerHTML =
    `<b>${data.username}</b><br><br>${data.vouches} vouches`;
}

async function loadLeaderboard() {
  const res = await fetch("/leaderboard");
  const data = await res.json();

  const el = document.getElementById("leaderboardList");

  if (!data.length) {
    el.innerHTML = "<div class='lb-item'>No data</div>";
    return;
  }

  el.innerHTML = data.map((u, i) => `
    <div class="lb-item">
      <div class="lb-rank">#${i + 1}</div>
      <div class="lb-user">${u.username}</div>
      <div class="lb-score">${u.vouches}</div>
    </div>
  `).join("");
}

loadLeaderboard();

</script>

</body>
</html>
