<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vouch System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .box {
      width: 420px;
      background: #0e0e0e;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(255,255,255,0.06);
      position: relative;
    }

    h1 {
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .hint {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #000;
      border: 1px solid #2a2a2a;
      color: white;
      border-radius: 10px;
      outline: none;
    }

    input:focus {
      border-color: #555;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .result {
      margin-top: 18px;
      padding: 14px;
      background: #000;
      border: 1px solid #222;
      border-radius: 12px;
      text-align: center;
      min-height: 40px;
    }

    .line {
      height: 1px;
      background: #222;
      margin: 20px 0;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    .footer span {
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>Vouch System</h1>

  <div class="subtitle">
    Build sprite reputation by vouching users using their Discord usernames
  </div>

  <div class="hint">
    Use format: <b>@discordname</b>
  </div>

  <input id="vouchUser" placeholder="@username">
  <button onclick="vouch()">Send Vouch</button>

  <div class="line"></div>

  <input id="checkUser" placeholder="@checkuser">
  <button onclick="check()">Check Vouches</button>

  <div class="result" id="result">Ready</div>

  <div class="footer">
    created by <span>@Itzsplicez</span>
  </div>

</div>

<script>
async function vouch() {
  const username = document.getElementById("vouchUser").value;

  const res = await fetch("/vouch", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username })
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.message;
}

async function check() {
  const username = document.getElementById("checkUser").value;

  const res = await fetch("/user/" + username);
  const data = await res.json();

  document.getElementById("result").innerHTML =
    `<b>${data.username}</b><br><br>⭐ ${data.vouches} Vouches`;
}
</script>

</body>
</html>
