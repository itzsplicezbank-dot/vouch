<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 700px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: #111;
  border: 1px solid #222;
  padding: 20px;
  border-radius: 12px;
}

h1 {
  text-align: center;
}

h2 {
  font-size: 15px;
  color: #ccc;
}

textarea, input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #000;
  color: #fff;
  border: 1px solid #333;
  border-radius: 8px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover { opacity: 0.85; }

#msg {
  text-align: center;
  color: #aaa;
  font-size: 13px;
}

.list {
  font-size: 12px;
  color: #888;
  margin-top: 10px;
  word-break: break-word;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h1>Admin Panel</h1>
  <div id="msg"></div>
</div>

<div class="card">
  <h2>Banner</h2>
  <textarea id="banner"></textarea>
  <button onclick="saveBanner()">Save</button>
</div>

<div class="card">
  <h2>Export</h2>
  <button onclick="window.location='/admin/export'">Download data.txt</button>
</div>

<div class="card">
  <h2>Import (RESET)</h2>
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
</div>

<div class="card">
  <h2>Bad Words</h2>

  <input id="word" placeholder="word">

  <button onclick="add()">Add</button>
  <button onclick="remove()">Remove</button>

  <div class="list" id="list"></div>
</div>

</div>

<script>

function msg(t){ document.getElementById("msg").innerText = t; }

async function loadBanner(){
  const r = await fetch("/banner");
  const d = await r.json();
  document.getElementById("banner").value = d.text;
}

async function saveBanner(){
  const text = document.getElementById("banner").value;

  const r = await fetch("/admin/banner", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  const d = await r.json();
  msg(d.message);
}

async function upload(){
  const f = document.getElementById("file").files[0];
  const text = await f.text();

  const r = await fetch("/admin/import", {
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:text
  });

  const d = await r.json();
  msg(d.message);
}

async function loadWords(){
  const r = await fetch("/admin/badwords");
  const d = await r.json();

  document.getElementById("list").innerText =
    d.words.join(", ");
}

async function add(){
  const word = document.getElementById("word").value;

  await fetch("/admin/badwords/add", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({word})
  });

  loadWords();
}

async function remove(){
  const word = document.getElementById("word").value;

  await fetch("/admin/badwords/remove", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({word})
  });

  loadWords();
}

loadBanner();
loadWords();

</script>

</body>
</html>
