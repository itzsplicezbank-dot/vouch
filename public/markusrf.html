<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 700px;
  max-width: 100%;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 20px;
}

h1 {
  text-align: center;
  margin: 0;
}

h2 {
  margin-bottom: 10px;
  font-size: 16px;
  color: #ccc;
}

textarea, input[type="file"], input[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #000;
  color: #fff;
  border: 1px solid #333;
  border-radius: 8px;
  outline: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

.small-btn {
  background: #1a1a1a;
  color: #fff;
  border: 1px solid #333;
}

#msg {
  text-align: center;
  font-size: 13px;
  color: #aaa;
  min-height: 18px;
}

.word-list {
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
  line-height: 1.4;
  word-break: break-word;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="card">
    <h1>Admin Panel</h1>
    <div id="msg"></div>
  </div>

  <!-- BANNER -->
  <div class="card">
    <h2>Live Banner Editor</h2>

    <textarea id="banner" rows="3" placeholder="Edit banner text..."></textarea>

    <button onclick="saveBanner()">Save Banner</button>
  </div>

  <!-- EXPORT -->
  <div class="card">
    <h2>Export Database</h2>

    <p style="font-size:12px;color:#777;">
      Downloads full database as users.txt
    </p>

    <button class="small-btn" onclick="downloadData()">
      Download users.txt
    </button>
  </div>

  <!-- IMPORT -->
  <div class="card">
    <h2>Import users.txt (FULL RESET)</h2>

    <p style="font-size:12px;color:#777;">
      WARNING: This will replace all current data.
    </p>

    <input type="file" id="file" accept=".txt">

    <button onclick="uploadFile()">
      Upload & Replace Database
    </button>
  </div>

  <!-- BAD WORDS -->
  <div class="card">
    <h2>Bad Words Filter</h2>

    <input type="text" id="wordInput" placeholder="Enter word..." />

    <button onclick="addWord()">Add Word</button>
    <button onclick="removeWord()">Remove Word</button>

    <div class="word-list" id="wordList">Loading...</div>
  </div>

</div>

<script>

function setMsg(text) {
  document.getElementById("msg").innerText = text;
}

/* ---------------- BANNER ---------------- */

async function loadBanner() {
  const res = await fetch("/banner");
  const data = await res.json();
  document.getElementById("banner").value = data.text || "";
}

async function saveBanner() {
  const text = document.getElementById("banner").value;

  const res = await fetch("/admin/banner", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();
  setMsg(data.message);
}

loadBanner();

/* ---------------- EXPORT ---------------- */

function downloadData() {
  window.location.href = "/admin/export";
}

/* ---------------- IMPORT ---------------- */

async function uploadFile() {
  const file = document.getElementById("file").files[0];

  if (!file) {
    setMsg("Select a file first");
    return;
  }

  const text = await file.text();

  const res = await fetch("/admin/import", {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: text
  });

  const data = await res.json();
  setMsg(data.message);
}

/* ---------------- BAD WORDS ---------------- */

async function loadWords() {
  const res = await fetch("/admin/badwords");
  const data = await res.json();

  document.getElementById("wordList").innerText =
    "Current: " + (data.words.join(", ") || "none");
}

async function addWord() {
  const word = document.getElementById("wordInput").value;

  const res = await fetch("/admin/badwords/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ word })
  });

  await res.json();
  document.getElementById("wordInput").value = "";
  loadWords();
}

async function removeWord() {
  const word = document.getElementById("wordInput").value;

  const res = await fetch("/admin/badwords/remove", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ word })
  });

  await res.json();
  document.getElementById("wordInput").value = "";
  loadWords();
}

loadWords();

</script>

</body>
</html>
